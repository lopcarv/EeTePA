conky.config = { 

    -- POSICIONAMENTO E JANELA 
    alignment = 'top_left', 
    gap_x = 5, 
    gap_y = 5, 
    minimum_width = 240, 
    maximum_width = 440, 
    minimum_height = 880, 

      -- Habilita bordas arredondadas e define o raio (em pixels)
    draw_window_borders = true,
    border_inner_margin = 10,
    border_outer_margin = 0,
    border_width = 1,
    own_window = true, 
    own_window_class = 'Conky', 
    own_window_type = 'normal', 
    own_window_transparent = false, 
    own_window_argb_visual = true, 
    own_window_argb_value = 168,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager', 
   
    double_buffer = true, 
    update_interval = 1.0, 
    use_xft = true, 
    font = 'JetBrainsMono Nerd Font:size=9', 
   
	color1 = '#4FD1C5', -- Ciano suave (destaques)
	color2 = '#7C7CFF', -- Roxo azulado (títulos)
	color3 = '#A7F3D0', -- Verde menta (uso normal)
	color4 = '#F87171', -- Vermelho suave (alerta)
	color5 = '#60A5FA', -- Azul tech (infos)
	color6 = '##FFFF00', -- Amarelo
	default_color = '#E5E7EB', -- Cinza claro (texto)
} 
 conky.text = [[
# ===================== CABEÇALHO FUTURISTA AJUSTADO =====================
${voffset 24}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=30}${font}\
${goto 60}${voffset -14}${color #FFFFFF}${font JetBrainsMono Nerd Font:italic:bold:size=22}LINUX${font}\
${voffset 10}${color #CCFF00}${hr 1}
${voffset -8}${color #00A2ED}${stippled_hr 1}
# ===================== SISTEMA / DADOS =====================
${voffset 4}${color #00F3FF}${font JetBrainsMono Nerd Font:bold:size=11}󰒋${font} ${color #FFFFFF}Host:${alignr}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}${nodename}${font}
${voffset 1}${color #00F3FF}${font JetBrainsMono Nerd Font:bold:size=11}󰣚${font} ${color #FFFFFF}Distro:${alignr}${color #00A2ED}${font JetBrainsMono Nerd Font:bold:size=11}${execi 65000 lsb_release -ds}${font}
${voffset 1}${color #00F3FF}${font JetBrainsMono Nerd Font:bold:size=11}󰔄${font} ${color #FFFFFF}Kernel:${alignr}${color #FFFFFF}${font JetBrainsMono Nerd Font:size=11}${execi 65000 uname -r}${font}
${voffset 1}${color #00F3FF}${font JetBrainsMono Nerd Font:bold:size=11}󱑎${font} ${color #FFFFFF}Uptime:${alignr}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}${uptime}${font}
# ===================== BATERIA =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}󰁹 BATERIA ${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF}Energia:${alignr}${color #00F3FF}${font JetBrainsMono Nerd Font:bold:size=11}${battery_percent BAT0}%${font} ${color #FFFFFF}• ${battery_time BAT0}
${voffset 1}${color #00A2ED}${battery_bar BAT0 4}
# ===================== PROCESSADOR =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11} CPU ${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF}Freq / Uso:${alignr}${color #00F3FF}${freq_g}GHz ${color #FFFFFF}• ${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}${cpu cpu0}%${font}
${voffset 1}${color #00A2ED}${cpubar cpu0 4}
${voffset 2}${cpugraph cpu0 25 00F3FF FF2EFF -t}
${voffset 2}${color #FFFFFF}C1: ${color #00F3FF}${cpu cpu1}% ${alignr}${color #FFFFFF}C2: ${color #00F3FF}${cpu cpu2}%
${voffset 1}${color #00A2ED}${cpubar cpu1 3,115}${alignr}${cpubar cpu2 3,115}
${voffset 1}${color #FFFFFF}C3: ${color #00F3FF}${cpu cpu3}% ${alignr}${color #FFFFFF}C4: ${color #00F3FF}${cpu cpu4}%
${voffset 1}${color #00A2ED}${cpubar cpu3 3,115}${alignr}${cpubar cpu2 3,115}
# ===================== ARMAZENAMENTO =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}󰋊 STORAGE ${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF}Disco /:${alignr}${color #00F3FF}${fs_used /} / ${fs_size /}
${voffset 1}${color #00A2ED}${fs_bar 4 /}
${voffset 2}${color #FFFFFF}󰓅 Read: ${color #CCFF00}${diskio_read}${alignr}${color #FFFFFF}󰓄 Write: ${color #FF2EFF}${diskio_write}
# ===================== MEMÓRIA =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}󰍛 MEMÓRIA ${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF}RAM:${alignr}${color #00F3FF}$mem / $memmax ${color #CCFF00}($memperc%)
${voffset 1}${color #00A2ED}${membar 4}
${voffset 2}${color #FFFFFF}Swap:${alignr}${color #00F3FF}$swap / $swapmax
${voffset 1}${color #00A2ED}${swapbar 4}
# ===================== REDE =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}󰖩 NET IP: ${color #FFFFFF}${addr wlp0s20f3}${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF} ${color #00F3FF}${downspeed wlp0s20f3}${alignr}${color #FFFFFF} ${color #FF2EFF}${upspeed wlp0s20f3}
${voffset 2}${downspeedgraph wlp0s20f3 22,115 00F3FF 00A2ED -t} ${alignr}${upspeedgraph wlp0s20f3 22,115 FF2EFF 00A2ED -t}
# ===================== SENSORES =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}󰔏 SENSORS ${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF} CPU Temp:${alignr}${color #FF2EFF}${execi 10 sensors | grep 'Package id 0' | awk '{print $4}'}
${voffset 1}${color #FFFFFF}󰋊 SSD Temp:${alignr}${color #FF2EFF}${execi 10 sensors | grep 'Composite' | awk '{print $2}'}
# ===================== PROCESSOS =====================
${voffset 4}${color #CCFF00}${font JetBrainsMono Nerd Font:bold:size=11}󰈮 TOP PROCESSOS ${font}${color #00A2ED}${stippled_hr 1}
${voffset 2}${color #FFFFFF}${top name 1}${alignr}${color #00F3FF}${top cpu 1}%
${color #FFFFFF}${top name 2}${alignr}${color #00F3FF}${top cpu 2}%
${color #FFFFFF}${top_mem name 1}${alignr}${color #CCFF00}${top_mem mem 1}%
${color #FFFFFF}${top_mem name 2}${alignr}${color #CCFF00}${top_mem mem 2}%
${voffset 4}${color #00A2ED}${stippled_hr 1}
]]


